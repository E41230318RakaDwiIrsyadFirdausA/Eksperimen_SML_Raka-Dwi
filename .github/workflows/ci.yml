name: Machine Learning Pipeline CI

# Alur kerja ini akan otomatis berjalan setiap kali ada push atau pull request ke branch main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Langkah 1: Mengambil kode proyek dari repositori GitHub kamu ke server Ubuntu Actions
    - name: Checkout repository
      uses: actions/checkout@v3

    # Langkah 2: Menyiapkan lingkungan Python versi 3.10 di server cloud
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Langkah 3: Menginstal semua library/dependensi yang dibutuhkan proyekmu (juku ada requirements.txt)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Langkah 4: Menjalankan skrip otomasi preprocessing kamu untuk memastikan tidak ada eror pada kode
    - name: Run Preprocessing Script
      run: |
        python preprocessing/automate_Raka.py